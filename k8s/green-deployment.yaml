apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  labels:
    app: demo
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      version: green
  template:
    metadata:
      labels:
        app: demo
        version: green
    spec:
      containers:
      - name: app
        image: registry.cn-shanghai.aliyuncs.com/${NAMESPACE}/demo:green # Use placeholder, user will replace
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: "green"
